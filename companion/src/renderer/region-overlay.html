<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Region Selection</title>
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        cursor: crosshair;
        background: rgba(0, 0, 0, 0.2);
      }
      #selection {
        position: absolute;
        border: 2px solid #2563eb;
        background: rgba(37, 99, 235, 0.2);
        display: none;
      }
      #hint {
        position: fixed;
        top: 12px;
        left: 12px;
        color: white;
        font-family: Arial, sans-serif;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div id="hint">Drag to select a region. Press Escape to cancel.</div>
    <div id="selection"></div>
    <script>
      const selection = document.getElementById("selection");
      let startX = 0;
      let startY = 0;
      let dragging = false;

      const complete = (rect) => window.regionOverlay.complete(rect);
      const cancel = () => window.regionOverlay.cancel();

      window.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          cancel();
        }
      });

      window.addEventListener("mousedown", (event) => {
        dragging = true;
        startX = event.clientX;
        startY = event.clientY;
        selection.style.display = "block";
        selection.style.left = `${startX}px`;
        selection.style.top = `${startY}px`;
        selection.style.width = "0px";
        selection.style.height = "0px";
      });

      window.addEventListener("mousemove", (event) => {
        if (!dragging) return;
        const left = Math.min(startX, event.clientX);
        const top = Math.min(startY, event.clientY);
        const width = Math.abs(event.clientX - startX);
        const height = Math.abs(event.clientY - startY);
        selection.style.left = `${left}px`;
        selection.style.top = `${top}px`;
        selection.style.width = `${width}px`;
        selection.style.height = `${height}px`;
      });

      window.addEventListener("mouseup", (event) => {
        if (!dragging) return;
        dragging = false;
        const left = Math.min(startX, event.clientX);
        const top = Math.min(startY, event.clientY);
        const width = Math.abs(event.clientX - startX);
        const height = Math.abs(event.clientY - startY);
        if (width < 4 || height < 4) {
          cancel();
          return;
        }
        complete({ x: left, y: top, width, height });
      });
    </script>
  </body>
</html>
